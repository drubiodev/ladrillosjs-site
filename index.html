<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LadrillosJS</title>
  <link rel="stylesheet" href="./styles/site.css" />

  <!-- Inline critical CSS for hero section -->
  <style>
    .hero {
      min-height: 100vh;
      /* Ensures page has height */
    }
  </style>

  <script type="module">
    import * as ladrillosjs from "ladrillosjs";

    await ladrillosjs.registerComponents([
      // Eager: Above-the-fold & interactive
      { name: "site-header", path: "./components/site-header.html" },
      { name: "hero-section", path: "./components/hero-section.html" },
      { name: "install-section", path: "./components/install.html" },
      { name: "feature-section", path: "./components/feature-section.html", },
      { name: "footer-section", path: "./components/footer-section.html", },
    ]);
    document.body.classList.remove("loading");
  </script>
</head>

<body class="loading">
  <site-header version="v2_rc"></site-header>
  <hero-section></hero-section>
  <feature-section id="features"></feature-section>
  <footer-section></footer-section>
</body>

</html>
