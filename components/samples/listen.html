<style>
    .listen-card {
        width: 100%;
        padding: 1rem 1.1rem;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
    }

    .listen-card .label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #8b5cf6;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
    }

    .listen-card .label-text {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
    }

    .listen-card .label-text::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #8b5cf6;
        animation: listenPulse 1.6s ease-in-out infinite;
    }

    .listen-card .count {
        font-size: 0.65rem;
        color: #64748b;
        letter-spacing: 0.05em;
        font-variant-numeric: tabular-nums;
    }

    .inbox {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        min-height: 56px;
        max-height: 120px;
        overflow-y: auto;
    }

    .inbox .msg {
        padding: 0.5rem 0.75rem;
        background: linear-gradient(135deg, rgba(139, 92, 246, 0.08), rgba(168, 85, 247, 0.08));
        border: 1px solid rgba(139, 92, 246, 0.2);
        border-radius: 8px;
        font-size: 0.875rem;
        color: #0f172a;
        animation: msgIn 0.25s ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .inbox .msg svg {
        width: 14px;
        height: 14px;
        color: #8b5cf6;
        flex-shrink: 0;
    }

    .inbox .msg-text {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .inbox .empty {
        text-align: center;
        padding: 0.75rem;
        color: #94a3b8;
        font-size: 0.8125rem;
        font-style: italic;
    }

    @keyframes msgIn {
        from {
            opacity: 0;
            transform: translateX(-6px);
        }

        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes listenPulse {

        0%,
        100% {
            opacity: 1;
            box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4);
        }

        50% {
            opacity: 0.7;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0);
        }
    }
</style>

<div class="listen-card">
    <div class="label">
        <span class="count">{messages.length} received</span>
    </div>
    <div class="inbox">
        <div class="msg" $for="msg in messages">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd" />
            </svg>
            <span class="msg-text">{msg}</span>
        </div>
        <div class="empty" $if="messages.length === 0">
            Waiting for messages…
        </div>
    </div>
</div>

<script>
    let messages = [];

    $listen("message-sent", (data) => {
        messages = [...messages, data];
    });
</script>
