<style>
    .emit-card {
        width: 100%;
        padding: 1rem 1.1rem;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        display: flex;
        flex-direction: column;
        gap: 0.625rem;
    }


    .emit-card .row {
        display: flex;
        gap: 0.5rem;
    }

    .emit-card input {
        flex: 1;
        padding: 0.6rem 0.85rem;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 0.9rem;
        color: #0f172a;
        transition: all 0.2s ease;
    }

    .emit-card input:focus {
        outline: none;
        border-color: #8b5cf6;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }

    .emit-card input::placeholder {
        color: #94a3b8;
    }

    .emit-card button {
        padding: 0 1rem;
        background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
    }

    .emit-card button:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }

    .emit-card button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .emit-card button svg {
        width: 14px;
        height: 14px;
    }
</style>

<div class="emit-card">
    <div class="row">
        <input $bind="message" type="text" placeholder="Type a message…"
            onkeydown="if (event.key === 'Enter') sendMessage()" />
        <button onclick="sendMessage()">
            Send
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path
                    d="M3.105 2.289a.75.75 0 00-.826.95l1.414 4.925A1.5 1.5 0 005.135 9.25h6.115a.75.75 0 010 1.5H5.135a1.5 1.5 0 00-1.442 1.086l-1.414 4.926a.75.75 0 00.826.95 28.896 28.896 0 0015.293-7.154.75.75 0 000-1.115A28.897 28.897 0 003.105 2.289z" />
            </svg>
        </button>
    </div>
</div>

<script>
    let message = "";

    function sendMessage() {
        const text = message.trim();
        if (!text) return;
        $emit("message-sent", text);
        message = "";
    }
</script>
