<style>
  .form-container {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    width: 100%;
    max-width: 340px;
  }

  .form-container h2 {
    font-size: 1.75rem;
    font-weight: 700;
    color: #0f172a;
    letter-spacing: -0.01em;
  }

  .form-container input[type="text"],
  .form-container input[type="email"] {
    padding: 0.7rem 0.95rem;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    color: #0f172a;
    font-size: 0.9375rem;
    width: 100%;
    transition: all 0.2s ease;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
  }

  .form-container input[type="text"]:focus,
  .form-container input[type="email"]:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
  }

  .form-container input::placeholder {
    color: #94a3b8;
  }

  .form-container p {
    color: #475569;
    font-size: 0.875rem;
    margin: 0;
    font-variant-numeric: tabular-nums;
  }

  .form-container label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: #334155;
    font-size: 0.9375rem;
    cursor: pointer;
    font-weight: 500;
  }

  .form-container input[type="checkbox"] {
    width: 17px;
    height: 17px;
    cursor: pointer;
    accent-color: #6366f1;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    width: 100%;
    align-items: stretch;
  }
</style>

<div class="form-container">
  <h2>Hello, {name}!</h2>
  <div class="form-group">
    <input type="text" $bind="name" placeholder="Your name" />
  </div>

  <div class="form-group">
    <p>Email: {email}</p>
    <input type="email" $bind="email" placeholder="your@email.com" />
  </div>

  <label>
    <input type="checkbox" $bind="subscribe" />
    Subscribe: {subscribe}
  </label>
</div>

<script>
  let name = "World";
  let email = "";
  let subscribe = false;
</script>
