<style>
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    background: #f5f5f5;
  }

  .hero-card {
    box-shadow: 1px 1px #eee;
    background: white;
    border-radius: 24px;
    width: 100%;
    margin: 0 auto;
    min-height: calc(100vh - 4rem);
    display: flex;
    align-items: center;
    padding: 4rem;
    position: relative;
    overflow: hidden;
  }

  .hero-container {
    max-width: 600px;
    position: relative;
    z-index: 1;
  }

  /* Brick Animation - SVG Isometric */
  .brick-animation {
    position: absolute;
    right: 5%;
    top: 50%;
    transform: translateY(-50%);
    width: 420px;
    height: 420px;
    pointer-events: none;
  }

  .brick-animation svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Cube groups animate in */
  .brick-animation .cube-group {
    opacity: 0;
    animation: cubeDropIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .brick-animation .cube-group:nth-child(1) {
    animation-delay: 0.1s;
  }
  .brick-animation .cube-group:nth-child(2) {
    animation-delay: 0.18s;
  }
  .brick-animation .cube-group:nth-child(3) {
    animation-delay: 0.14s;
  }
  .brick-animation .cube-group:nth-child(4) {
    animation-delay: 0.24s;
  }
  .brick-animation .cube-group:nth-child(5) {
    animation-delay: 0.42s;
  }
  .brick-animation .cube-group:nth-child(6) {
    animation-delay: 0.6s;
  }
  .brick-animation .cube-group:nth-child(7) {
    animation-delay: 0.7s;
  }
  .brick-animation .cube-group:nth-child(8) {
    animation-delay: 0.82s;
  }

  /* Shadow fades in */
  .brick-animation .shadow-el {
    opacity: 0;
    animation: shadowReveal 0.8s ease-out 0.2s forwards;
  }

  @keyframes shadowReveal {
    to {
      opacity: 0.5;
    }
  }

  @keyframes cubeDropIn {
    0% {
      opacity: 0;
      transform: translateY(-30px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Responsive */
  @media (max-width: 1100px) {
    .brick-animation {
      right: 2%;
      transform: translateY(-50%) scale(0.8);
    }
  }

  @media (max-width: 900px) {
    .brick-animation {
      opacity: 0.35;
      right: -5%;
      transform: translateY(-50%) scale(0.65);
    }
  }

  @media (max-width: 768px) {
    .brick-animation {
      display: none;
    }
  }

  .hero-tagline {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .hero-tagline span {
    color: var(--primary);
    font-weight: 500;
  }

  .hero-title {
    font-size: clamp(3rem, 8vw, 4.5rem);
    font-weight: 700;
    line-height: 1.05;
    color: var(--text-primary);
    margin-bottom: 2rem;
    letter-spacing: -0.03em;
  }

  .hero-subtitle {
    display: none;
  }

  .hero-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1.5rem;
  }

  .btn-hero {
    display: none;
  }

  /* Install picker */
  .install-picker {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.75rem;
    width: 100%;
    max-width: 400px;
  }

  /* Tab toggle - pill style */
  .install-tabs {
    display: inline-flex;
    background: #f1f5f9;
    padding: 3px;
    border-radius: 6px;
    gap: 0;
  }

  .tab-btn {
    padding: 0.4rem 1rem;
    border: none;
    background: transparent;
    color: #64748b;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 4px;
  }

  .tab-btn:hover:not(.active) {
    color: #334155;
  }

  .tab-btn.active {
    background: white;
    color: var(--text-primary);
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
  }

  /* Install command box */
  .install-box {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--text-primary);
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: #e2e8f0;
    box-sizing: border-box;
  }

  .install-box code {
    flex: 1;
    min-width: 0;
    background: transparent;
    padding: 0;
    color: #e2e8f0;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Show full text on hover */
  .install-box:hover code {
    overflow-x: auto;
    text-overflow: clip;
  }

  /* Custom scrollbar for code */
  .install-box code::-webkit-scrollbar {
    height: 4px;
  }

  .install-box code::-webkit-scrollbar-track {
    background: transparent;
  }

  .install-box code::-webkit-scrollbar-thumb {
    background: #475569;
    border-radius: 2px;
  }

  .install-box code::-webkit-scrollbar-thumb:hover {
    background: #64748b;
  }

  .install-box .highlight {
    color: var(--primary-light);
  }

  .install-box .tag {
    color: var(--primary-light);
  }

  .install-box .attr {
    color: #7dd3fc;
  }

  .install-box .string {
    color: #86efac;
  }

  .copy-btn {
    background: #334155;
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    color: #94a3b8;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    flex-shrink: 0;
    min-width: 85px;
  }

  .copy-btn:hover {
    background: #475569;
    color: #e2e8f0;
  }

  .copy-btn svg {
    width: 16px;
    height: 16px;
  }

  .copy-btn {
    background: #475569;
    border: none;
    padding: 0.4rem 0.75rem;
    border-radius: 4px;
    cursor: pointer;
    color: #94a3b8;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.375rem;
    font-size: 0.75rem;
    font-weight: 500;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    background: #64748b;
    color: #e2e8f0;
  }

  .copy-btn svg {
    width: 14px;
    height: 14px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .hero-card {
      align-items: start;
      padding: 6rem 2rem 3rem;
      min-height: calc(100vh - 2rem);
    }

    .hero-container {
      max-width: 100%;
    }

    .hero-title {
      font-size: 2.5rem;
    }

    .install-picker {
      max-width: 100%;
    }

    .install-box {
      width: 100%;
      max-width: 320px;
    }
  }

  @media (max-width: 480px) {
    .hero-card {
      padding: 5rem 1.5rem 2rem;
      border-radius: 16px;
    }

    .hero-title {
      font-size: 2rem;
    }

    .hero-tagline {
      font-size: 0.85rem;
    }

    .install-box {
      font-size: 0.7rem;
      padding: 0.625rem 0.75rem;
    }
  }
</style>

<section class="hero">
  <div class="hero-card">
    <!-- Brick stacking animation - SVG Isometric -->
    <div class="brick-animation">
      <svg viewBox="60 80 340 360" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="brickShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
          </filter>
        </defs>

        <!-- Shadow -->
        <ellipse
          class="shadow-el"
          cx="210"
          cy="390"
          rx="130"
          ry="35"
          fill="rgba(0,0,0,0.13)"
          filter="url(#brickShadow)"
        />

        <!-- ====== BOTTOM LAYER z=0 ====== -->
        <!-- Draw order: b1(back) → b2/b3 → b4(front) -->

        <!-- b1 grid(0,0) - back -->
        <g class="cube-group">
          <polygon points="200,230 252,260 200,290 148,260" fill="#fdba74" />
          <polygon points="148,260 200,290 200,340 148,310" fill="#f97316" />
          <polygon points="200,290 252,260 252,310 200,340" fill="#ea580c" />
        </g>

        <!-- b2 grid(1,0) - right -->
        <g class="cube-group">
          <polygon points="252,260 304,290 252,320 200,290" fill="#fdba74" />
          <polygon points="200,290 252,320 252,370 200,340" fill="#f97316" />
          <polygon points="252,320 304,290 304,340 252,370" fill="#ea580c" />
        </g>

        <!-- b3 grid(0,1) - left -->
        <g class="cube-group">
          <polygon points="148,260 200,290 148,320 96,290" fill="#fdba74" />
          <polygon points="96,290 148,320 148,370 96,340" fill="#f97316" />
          <polygon points="148,320 200,290 200,340 148,370" fill="#ea580c" />
        </g>

        <!-- b4 grid(1,1) - front -->
        <g class="cube-group">
          <polygon points="200,290 252,320 200,350 148,320" fill="#fdba74" />
          <polygon points="148,320 200,350 200,400 148,370" fill="#f97316" />
          <polygon points="200,350 252,320 252,370 200,400" fill="#ea580c" />
        </g>

        <!-- ====== MIDDLE LAYER z=1 ====== -->
        <!-- m1 grid(0.5, 0.5) - centered -->
        <g class="cube-group">
          <polygon points="200,210 252,240 200,270 148,240" fill="#fdba74" />
          <polygon points="148,240 200,270 200,320 148,290" fill="#f97316" />
          <polygon points="200,270 252,240 252,290 200,320" fill="#ea580c" />
        </g>

        <!-- ====== TOP LAYER z=2 ====== -->
        <!-- t2 - L vertical stem (behind t1, draw first) -->
        <g class="cube-group">
          <polygon points="148,145 200,175 148,205 96,175" fill="#fdba74" />
          <polygon points="96,175 148,205 148,255 96,225" fill="#f97316" />
          <polygon points="148,205 200,175 200,225 148,255" fill="#ea580c" />
        </g>

        <!-- t1 - L horizontal bar (2 units wide) -->
        <g class="cube-group">
          <polygon points="200,115 304,175 252,205 148,145" fill="#fdba74" />
          <polygon points="148,145 252,205 252,255 148,195" fill="#f97316" />
          <polygon points="252,205 304,175 304,225 252,255" fill="#ea580c" />
        </g>

        <!-- t3 - standalone block (front-right) -->
        <g class="cube-group">
          <polygon points="304,175 356,205 304,235 252,205" fill="#fdba74" />
          <polygon points="252,205 304,235 304,285 252,255" fill="#f97316" />
          <polygon points="304,235 356,205 356,255 304,285" fill="#ea580c" />
        </g>
      </svg>
    </div>

    <div class="hero-container">
      <p class="hero-tagline">
        Zero dependencies. <span>Pure JavaScript.</span>
      </p>
      <h1 class="hero-title">
        Build Better,<br />
        Build Simpler
      </h1>

      <div class="hero-actions">
        <div class="install-picker">
          <div class="install-tabs">
            <button
              class="tab-btn active"
              onclick="switchTab('npm')"
              $ref="npmTab"
            >
              npm
            </button>
            <button class="tab-btn" onclick="switchTab('cdn')" $ref="cdnTab">
              CDN
            </button>
          </div>

          <div class="install-box" $ref="npmBox">
            <code>npm install <span class="highlight">ladrillosjs</span></code>
            <button
              class="copy-btn"
              onclick="copyCommand('npm')"
              $ref="npmCopyBtn"
            >
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
                ></path>
              </svg>
              Copy
            </button>
          </div>

          <div class="install-box" $ref="cdnBox" style="display: none">
            <code
              >&lt;<span class="tag">script</span>
              <span class="attr">src</span>=<span class="string"
                >"https://cdn.jsdelivr.net/npm/ladrillosjs"</span
              >&gt;&lt;/<span class="tag">script</span>&gt;</code
            >
            <button
              class="copy-btn"
              onclick="copyCommand('cdn')"
              $ref="cdnCopyBtn"
            >
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
                ></path>
              </svg>
              Copy
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  const commands = {
    npm: "npm install ladrillosjs",
    cdn: '<script src="https://cdn.jsdelivr.net/npm/ladrillosjs"><\/script>',
  };

  const switchTab = (tab) => {
    // Update tab buttons
    $refs.npmTab.classList.toggle("active", tab === "npm");
    $refs.cdnTab.classList.toggle("active", tab === "cdn");

    // Show/hide install boxes
    $refs.npmBox.style.display = tab === "npm" ? "flex" : "none";
    $refs.cdnBox.style.display = tab === "cdn" ? "flex" : "none";
  };

  const copyCommand = (type) => {
    navigator.clipboard.writeText(commands[type]);
    const btn = type === "npm" ? $refs.npmCopyBtn : $refs.cdnCopyBtn;
    const originalHTML = btn.innerHTML;
    btn.innerHTML =
      '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!';
    setTimeout(() => {
      btn.innerHTML = originalHTML;
    }, 2000);
  };
</script>
