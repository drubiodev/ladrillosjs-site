<style>
  .hero {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    background: #f5f5f5;
  }

  .hero-card {
    box-shadow: 1px 1px #eee;
    background: white;
    border-radius: 24px;
    width: 100%;
    margin: 0 auto;
    min-height: calc(100vh - 8rem);
    min-height: calc(100dvh - 8rem);
    display: flex;
    align-items: center;
    padding: 4rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .hero-inner {
    width: 100%;
    max-width: var(--container-max);
    margin: 0 auto;
    position: relative;
  }

  .hero-container {
    max-width: 600px;
    position: relative;
    z-index: 1;
  }

  /* Brick Animation - SVG Isometric */
  .brick-animation {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 460px;
    height: 460px;
    pointer-events: none;
  }

  .brick-animation svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* Cube groups animate in - smooth drop & land */
  .brick-animation .cube-group {
    opacity: 0;
    transform-box: fill-box;
    transform-origin: center;
    animation: cubeDropIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* Lay bricks: bottom-left → bottom-right → top */
  .brick-animation .cube-group:nth-of-type(1) {
    animation-delay: 0.1s;
  }

  .brick-animation .cube-group:nth-of-type(2) {
    animation-delay: 0.35s;
  }

  .brick-animation .cube-group:nth-of-type(3) {
    animation-delay: 0.65s;
  }

  /* Shadow fades in */
  .brick-animation .shadow-el {
    opacity: 0;
    animation: shadowReveal 0.9s ease-out 0.25s forwards;
  }

  @keyframes shadowReveal {
    to {
      opacity: 1;
    }
  }

  @keyframes cubeDropIn {
    0% {
      opacity: 0;
      transform: translateY(-40px);
    }

    60% {
      opacity: 1;
    }

    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Responsive */
  @media (max-width: 1100px) {
    .brick-animation {
      right: 0;
      transform: translateY(-50%) scale(0.8);
    }
  }

  @media (max-width: 900px) {
    .brick-animation {
      opacity: 0.35;
      right: -5%;
      transform: translateY(-50%) scale(0.65);
    }
  }

  @media (max-width: 768px) {
    .brick-animation {
      display: none;
    }
  }

  .hero-tagline {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .hero-tagline span {
    color: var(--primary);
    font-weight: 500;
  }

  .hero-title {
    font-size: clamp(3rem, 8vw, 4.5rem);
    font-weight: 700;
    line-height: 1.05;
    color: var(--text-primary);
    margin-bottom: 2rem;
    letter-spacing: -0.03em;
  }

  .hero-subtitle {
    display: none;
  }

  .hero-actions {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1.5rem;
  }

  .btn-hero {
    display: none;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .hero {
      min-height: auto;
    }

    .hero-card {
      align-items: center;
      justify-content: center;
      padding: 7rem 1.5rem 4rem;
      min-height: auto;
      border-radius: 20px;
    }

    .hero-container {
      max-width: 100%;
      text-align: center;
    }

    .hero-title {
      font-size: 2.5rem;
    }

    .hero-actions {
      align-items: center;
    }
  }

  @media (max-width: 480px) {
    .hero-card {
      padding: 6rem 1.25rem 3rem;
      border-radius: 16px;
    }

    .hero-title {
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    .hero-tagline {
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
  }
</style>

<section class="hero">
  <div class="hero-card">
    <div class="hero-inner">
      <!-- Brick stacking animation - SVG Isometric (matches logo: 2 bottom + 1 top) -->
      <div class="brick-animation">
        <svg viewBox="-20 40 488 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="heroBrickTop" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ffd4bd" />
              <stop offset="100%" stop-color="#fde4d0" />
            </linearGradient>
            <linearGradient id="heroBrickLeft" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fbc9a8" />
              <stop offset="100%" stop-color="#f5ad85" />
            </linearGradient>
            <linearGradient id="heroBrickRight" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#f5ad85" />
              <stop offset="100%" stop-color="#ff6b35" />
            </linearGradient>
            <filter id="brickShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="10" />
            </filter>
          </defs>

          <!-- Soft ground shadow -->
          <ellipse class="shadow-el" cx="224" cy="420" rx="190" ry="18" fill="rgba(234, 88, 12, 0.14)"
            filter="url(#brickShadow)" />

          <!-- Bottom-left brick -->
          <g class="cube-group">
            <polygon points="112,210 224,266 112,322 0,266" fill="url(#heroBrickTop)" />
            <polygon points="0,266 0,336 112,392 112,322" fill="url(#heroBrickLeft)" />
            <polygon points="112,322 224,266 224,336 112,392" fill="url(#heroBrickRight)" />
          </g>

          <!-- Bottom-right brick -->
          <g class="cube-group">
            <polygon points="336,210 448,266 336,322 224,266" fill="url(#heroBrickTop)" />
            <polygon points="224,266 224,336 336,392 336,322" fill="url(#heroBrickLeft)" />
            <polygon points="336,322 448,266 448,336 336,392" fill="url(#heroBrickRight)" />
          </g>

          <!-- Top brick -->
          <g class="cube-group">
            <polygon points="224,56 336,112 224,168 112,112" fill="url(#heroBrickTop)" />
            <polygon points="112,112 112,182 224,238 224,168" fill="url(#heroBrickLeft)" />
            <polygon points="224,168 336,112 336,182 224,238" fill="url(#heroBrickRight)" />
          </g>
        </svg>
      </div>

      <div class="hero-container">
        <p class="hero-tagline">
          Zero dependencies. <span>Pure JavaScript.</span>
        </p>
        <h1 class="hero-title">
          Build Better,<br />
          Build Simpler
        </h1>

        <install-section></install-section>
      </div>
    </div>
  </div>
</section>
